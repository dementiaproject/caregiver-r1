# Safety predicate patterns — REMOVED 2026-04-25
# =============================================================================
# Decision 2 (2026-04-25, see PROPOSAL §9): the two-layer safety design (regex
# C_cat hard veto + LLM c_safety Lagrangian) was collapsed into a single
# trajectory-level LLM safety judge producing c_safety ∈ {0,1,2,3}. The
# top tier (c_safety=3) triggers hard veto; tiers {1,2} feed the Lagrangian.
#
# Consequently the regex predicate banks (stance_affirm / permit / coercive /
# hard_correct) and the per-conflict risky-request keyword list previously
# in this file are no longer used. They have been removed; safety logic now
# lives entirely in `src/rewards/safety_judge.py` (Phase F deliverable).
